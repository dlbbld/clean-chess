#SAN validation
#format
validation.san.format.blank=The value cannot be blank.
validation.san.format.nonSpecific=The value does not conform to SAN format.

validation.san.format.firstCharacter=A SAN move must start with a file letter (a-h), a piece letter (R, N, B, Q, K), or O for castling, but starts with ''{0}''.

validation.san.format.pawn.secondCharacter=For a pawn forward move, the second character must be a rank digit (1-8) or the capture symbol (x), but is ''{0}''.
validation.san.format.pawn.captureToFile=For a pawn capture, a file letter (a-h) is expected after the capture symbol for the destination file, but is ''{0}''.
validation.san.format.pawn.captureToRank=For a pawn capture, a rank digit (1-8) is expected after the destination file for the destination rank, but is ''{0}''.

validation.san.format.pawn.promotion.noPromotionSymbol=For a pawn promotion, the promotion symbol ''='' is expected after the promotion rank.
validation.san.format.pawn.promotion.wrongPromotionSymbol=For a pawn promotion, the promotion symbol ''='' is expected after the promotion rank, but is ''{0}''.

validation.san.format.pawn.promotion.noPromotionPiece=For a pawn promotion, a promotion piece is required after the promotion symbol ''=''.
validation.san.format.pawn.promotion.wrongPromotionPiece=For a pawn promotion, the promotion piece must be R, N, B, or Q, but is ''{0}''.

validation.san.format.pawn.missingPromotion=A pawn move to rank {0} requires a promotion piece, for example {1}.
validation.san.format.pawn.promotionRank=For a pawn promotion, the second character must be a rank digit (1-8), but is ''{0}''.
validation.san.format.pawn.promotionCaptureStructure=A capturing pawn promotion must have the structure [file]x[file][rank]=[piece], for example dxe8=Q.

validation.san.format.pawn.length.general=A pawn move must have 2, 4, or 6 characters (excluding check/checkmate symbol).

validation.san.format.pawn.length.forward.nonPromotion=A non promoting pawn forward move must have exactly 2 characters (excluding check/checkmate symbol).
validation.san.format.pawn.length.forward.promotion=A promoting pawn forward move must have exactly 4 characters (excluding check/checkmate symbol).

validation.san.format.pawn.length.capture.general=A capturing pawn move must have exactly 4 (no promotion) or 6 (promotion) characters (excluding check/checkmate symbol).
validation.san.format.pawn.length.capture.nonPromotion=A non promoting pawn capturing move must have exactly 4 characters (excluding check/checkmate symbol).
validation.san.format.pawn.length.capture.promotion=A promoting pawn capturing move must have exactly 6 characters (excluding check/checkmate symbol).

validation.san.format.king.secondCharacter=For a king move, the second character must be a file letter (a-h) or the capture symbol (x), but is ''{0}''.
validation.san.format.king.destination=After the king letter, a destination square (file letter + rank digit) is expected, for example Ke5.
validation.san.format.king.captureDestination=After the capture symbol, a destination square (file letter + rank digit) is expected, for example Kxe5.
validation.san.format.king.fileSpecified=For king moves, the source file is never specified because there is only one king.
validation.san.format.king.rankSpecified=For king moves, the source rank is never specified because there is only one king.
validation.san.format.king.squareSpecified=For king moves, the source square is never specified because there is only one king.
validation.san.format.king.length=A king move must have 3 or 4 characters (excluding check/checkmate symbol), for example Ke5 or Kxe5.
validation.san.format.piece.length=A piece move must have 3 to 6 characters (excluding check/checkmate symbol).
validation.san.format.piece.destination=A piece move must end with a destination square (file letter + rank digit), for example Qe5.
validation.san.format.piece.middle=After the piece letter, the next character must be a file letter (a-h), a rank digit (1-8), or the capture symbol (x), but is ''{0}''.
validation.san.format.piece.middle2=The disambiguation characters ''{0}{1}'' are not valid. Expected: [file]x, [rank]x, or [file][rank].
validation.san.format.piece.middle3=The disambiguation characters ''{0}{1}{2}'' are not valid. Expected: [file][rank]x, for example Qc3xe5.
validation.san.format.castling=Castling must be O-O (king-side) or O-O-O (queen-side).

#movement
validation.san.movement.pawn.destinationRankWhite=A white pawn can never move to rank 2 or 1 as pawns cannot move backwards.
validation.san.movement.pawn.destinationRankBlack=A black pawn can never move to rank 7 or 8 as pawns cannot move backwards.
validation.san.movement.pawn.capturingFileNotAdjacent=A pawn can never capture on a non-adjacent file, only on adjacent files.

