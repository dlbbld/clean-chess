validation.san.movement.rank.bishop=A bishop can never move from rank {1} to square {2}. A bishop can only move diagonally.
validation.san.movement.rank.queen=A queen can never move from rank {1} to square {2}. A queen can only move orthogonally or diagonally.

validation.san.movement.square.ontoItself.general=A piece can never move onto itself.

validation.san.movement.square.notOntoItself.rook=A rook can never move from square {1} to square {2}. A rook can only move orthogonally.
validation.san.movement.square.notOntoItself.knight=A knight can never move from square {1} to square {2}. A knight can only move in an L-shape.
validation.san.movement.square.notOntoItself.bishop=A bishop can never move from square {1} to square {2}. A bishop can only move diagonally.
validation.san.movement.square.notOntoItself.queen=A queen can never move from square {1} to square {2}. A queen can only move orthogonally or diagonally.

