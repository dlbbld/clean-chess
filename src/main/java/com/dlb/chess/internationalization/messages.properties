#SAN validation
validation.san.blank=The move specification cannot be blank.
validation.san.format=The move specification must use the SAN format.
validation.san.format.invalidCharacter=The character ''{0}'' is not allowed in SAN notation. Allowed characters are: a-h, 1-8, R, N, B, Q, K, O, x, =, +, #, and -.
validation.san.format.firstCharacter=A SAN move must start with a file letter (a-h), a piece letter (R, N, B, Q, K), or O for castling, but starts with ''{0}''.
validation.san.format.pawn.secondCharacter=For a pawn move, the second character must be a rank digit (1-8) or the capture symbol (x), but is ''{0}''.
validation.san.format.pawn.captureToFile=After the capture symbol, a file letter (a-h) is expected for the destination file, but is ''{0}''.
validation.san.format.pawn.captureToRank=After the destination file, a rank digit (1-8) is expected for the destination rank, but is ''{0}''.
validation.san.format.pawn.missingPromotion=A pawn move to rank {0} requires a promotion piece, for example {1}.
validation.san.format.pawn.promotionRank=For a pawn promotion, the second character must be a rank digit (1-8), but is ''{0}''.
validation.san.format.pawn.promotionCaptureStructure=A capturing pawn promotion must have the structure [file]x[file][rank]=[piece], for example dxe8=Q.
validation.san.format.pawn.length=A pawn move must have 2, 4, or 6 characters (excluding check/checkmate symbol).
validation.san.format.king.secondCharacter=For a king move, the second character must be a file letter (a-h) or the capture symbol (x), but is ''{0}''.
validation.san.format.king.destination=After the king letter, a destination square (file letter + rank digit) is expected, for example Ke5.
validation.san.format.king.captureDestination=After the capture symbol, a destination square (file letter + rank digit) is expected, for example Kxe5.
validation.san.format.king.fileSpecified=For king moves, the source file is never specified because there is only one king.
validation.san.format.king.rankSpecified=For king moves, the source rank is never specified because there is only one king.
validation.san.format.king.squareSpecified=For king moves, the source square is never specified because there is only one king.
validation.san.format.king.length=A king move must have 3 or 4 characters (excluding check/checkmate symbol), for example Ke5 or Kxe5.
validation.san.format.piece.length=A piece move must have 3 to 6 characters (excluding check/checkmate symbol).
validation.san.format.piece.destination=A piece move must end with a destination square (file letter + rank digit), for example Qe5.
validation.san.format.piece.middle=After the piece letter, the next character must be a file letter (a-h), a rank digit (1-8), or the capture symbol (x), but is ''{0}''.
validation.san.format.piece.middle2=The disambiguation characters ''{0}{1}'' are not valid. Expected: [file]x, [rank]x, or [file][rank].
validation.san.format.piece.middle3=The disambiguation characters ''{0}{1}{2}'' are not valid. Expected: [file][rank]x, for example Qc3xe5.
validation.san.format.castling=Castling must be O-O (king-side) or O-O-O (queen-side).

